name: Deploy to Google Cloud Storage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-gcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:gcs

      - name: Prerender pages
        run: npx tsx scripts/prerender.ts

      - name: Generate sitemap
        run: npx tsx scripts/generate-sitemap.ts

      - name: Copy public assets into dist
        run: |
          mkdir -p dist/img dist/games/img dist/data
          cp -r public/img/* dist/img/ 2>/dev/null || true
          cp -r public/games/img/* dist/games/img/ 2>/dev/null || true
          cp -r public/data/* dist/data/ 2>/dev/null || true
          cp public/sitemap.xml dist/ 2>/dev/null || true
          cp public/*.png dist/ 2>/dev/null || true
          cp public/*.ico dist/ 2>/dev/null || true
          cp public/*.html dist/ 2>/dev/null || true
          echo "Final dist size:"
          du -sh dist/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Sync dist to GCS
        run: |
          gcloud storage rsync dist/ gs://website2026/ --recursive --delete-unmatched-destination-objects --exclude="games/html/.*"
