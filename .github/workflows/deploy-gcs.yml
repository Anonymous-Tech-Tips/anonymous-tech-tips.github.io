name: Deploy to Google Cloud Storage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-gcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (with GCS game base URL)
        run: npm run build
        env:
          VITE_GAMES_BASE: https://anonymous-tech-tips.github.io

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload app to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist
          destination: anonymous-tech-tips
          parent: false

      - name: Upload sandbox + game thumbnails
        run: |
          gcloud storage cp public/sandbox.html gs://anonymous-tech-tips/sandbox.html
          gcloud storage rsync public/games/img/ gs://anonymous-tech-tips/games/img/ --recursive

      - name: Make bucket objects public
        run: |
          gcloud storage buckets add-iam-policy-binding gs://anonymous-tech-tips \
            --member=allUsers --role=roles/storage.objectViewer 2>/dev/null || true
