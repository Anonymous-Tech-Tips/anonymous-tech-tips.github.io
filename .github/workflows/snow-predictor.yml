name: Snow Day ML Predictor

on:
  schedule:
    # Run every 2 hours (e.g. 0, 2, 4, 6...)
    - cron: '0 */2 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost scikit-learn requests joblib

    - name: Run ML Prediction
      run: python scripts/predict.py

    - name: Commit and Push Forecast JSON
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public/data/forecast.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update Snow Day ML ML Forecast [skip ci]" && git push)
