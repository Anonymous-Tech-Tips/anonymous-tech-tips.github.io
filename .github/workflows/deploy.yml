name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Strip game binaries from dist (keep under 1 GB Pages limit)
        run: |
          echo "Removing self-hosted game HTML binaries..."
          rm -rf dist/games/html dist/games/swf
          echo "Dist size after strip:"
          du -sh dist/
          echo "✓ Game binaries removed"

      - name: Prerender pages
        run: npx tsx scripts/prerender.ts

      - name: Generate sitemap
        run: npx tsx scripts/generate-sitemap.ts

      - name: Copy essential public assets
        run: |
          mkdir -p dist/img
          mkdir -p dist/games/img
          mkdir -p dist/data
          cp -r public/img/* dist/img/ 2>/dev/null || true
          cp -r public/games/img/* dist/games/img/ 2>/dev/null || true
          cp -r public/data/* dist/data/ 2>/dev/null || true
          cp public/sitemap.xml dist/ 2>/dev/null || true
          cp public/*.png dist/ 2>/dev/null || true
          cp public/*.ico dist/ 2>/dev/null || true
          echo "Final dist size:"
          du -sh dist/
          echo "✓ Essential assets copied"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
