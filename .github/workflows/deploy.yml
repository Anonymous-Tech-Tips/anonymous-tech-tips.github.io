name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

# Prevent multiple concurrent deployments from cancelling each other
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Strip self-hosted game files from dist
        # Games live permanently on gh-pages (deployed via deploy-games.yml once).
        # We do NOT re-upload them on every push — only app files are deployed here.
        run: |
          rm -rf dist/games dist/strongdog dist/topvaz66
          echo "Dist size (app only):"
          du -sh dist/

      - name: Prerender pages
        run: npx tsx scripts/prerender.ts

      - name: Generate sitemap
        run: npx tsx scripts/generate-sitemap.ts

      - name: Copy non-game public assets
        run: |
          mkdir -p dist/img dist/games/img dist/data
          cp -r public/img/* dist/img/ 2>/dev/null || true
          cp -r public/games/img/* dist/games/img/ 2>/dev/null || true
          cp -r public/data/* dist/data/ 2>/dev/null || true
          cp public/sitemap.xml dist/ 2>/dev/null || true
          cp public/*.png dist/ 2>/dev/null || true
          cp public/*.ico dist/ 2>/dev/null || true
          echo "Final dist size:"
          du -sh dist/

      - name: Deploy app to gh-pages (preserving existing game files)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            games/html/**
            games/swf/**
          single-commit: true
