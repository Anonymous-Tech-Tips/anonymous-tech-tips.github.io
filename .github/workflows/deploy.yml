name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Strip game binaries from dist (size limit fix)
        run: |
          echo "Removing large game HTML binary files from dist..."
          rm -rf dist/games/html
          echo "Dist size after strip:"
          du -sh dist/
          echo "✓ Game binaries removed from artifact"

      - name: Prerender pages
        run: npx tsx scripts/prerender.ts

      - name: Generate sitemap
        run: npx tsx scripts/generate-sitemap.ts

      - name: Copy essential public assets
        run: |
          echo "Copying non-game public assets to dist..."
          mkdir -p dist/img
          mkdir -p dist/games/img
          mkdir -p dist/data
          cp -r public/img/* dist/img/ 2>/dev/null || true
          cp -r public/games/img/* dist/games/img/ 2>/dev/null || true
          cp -r public/data/* dist/data/ 2>/dev/null || true
          cp public/sitemap.xml dist/ 2>/dev/null || true
          cp public/*.png dist/ 2>/dev/null || true
          cp public/*.ico dist/ 2>/dev/null || true
          echo "Final dist size:"
          du -sh dist/
          echo "✓ Essential assets copied"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: false  # Don't delete existing files (preserves games)
          clean-exclude: |
            games/**
          single-commit: false
